on:
  push:
    branches:
      - main
    paths:
      - "packages/react-native/android/**"
  pull_request:
    paths:
      - "packages/react-native/android/**"

name: Android Integration

jobs:
  ktlint:
    runs-on: ubuntu-latest
    name: Kotlin Lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install ktlint
        env:
          KTLINT_VERSION: 1.3.1
        run: |
          curl -fsSL -o "${RUNNER_TEMP}/ktlint" "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          chmod +x "${RUNNER_TEMP}/ktlint"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
      - run: ktlint --version
      - run: ktlint "packages/react-native/android/src/**/*.kt"

  build-new-arch:
    runs-on: ubuntu-latest
    name: Build Android (New Architecture)
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b
      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install

      - name: Library Build
        run: pnpm build

      - name: Build Android
        run: cd examples/v0.76.1-new-arch/android && ./gradlew assembleDebug --build-cache && cd ../..
        env:
          HOT_UPDATER_CHANNEL: dev

  build-old-arch:
    runs-on: ubuntu-latest
    name: Build Android (Old Architecture)
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b
      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install

      - name: Library Build
        run: pnpm build

      - name: Build Android
        run: cd examples/v0.74.1/android && ./gradlew assembleDebug --build-cache && cd ../..
        env:
          HOT_UPDATER_CHANNEL: dev
