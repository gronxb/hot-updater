on:
  push:
    branches:
      - main
    paths:
      - "packages/react-native/android/**"
  pull_request:
    paths:
      - "packages/react-native/android/**"

name: Android Integration

jobs:
  ktlint:
    runs-on: ubuntu-latest
    name: Kotlin Lint
    steps:
      - uses: actions/checkout@v4
      - name: Install ktlint
        env:
          KTLINT_VERSION: 1.3.1
        run: |
          curl -fsSL -o "${RUNNER_TEMP}/ktlint" "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          chmod +x "${RUNNER_TEMP}/ktlint"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
      - run: ktlint --version
      - run: ktlint "packages/react-native/android/src/**/*.kt"

  build-new-arch:
    runs-on: ubuntu-latest
    name: Build Android (New Architecture)
    steps:
      - uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install

      - name: Library Build
        run: pnpm nx run-many --target=build --projects='packages/*,plugins/*'

      - name: Build Android
        run: cd examples/v0.76.1-new-arch/android && ./gradlew assembleDebug --build-cache && cd ../..
        env:
          HOT_UPDATER_CHANNEL: dev

  build-old-arch:
    runs-on: ubuntu-latest
    name: Build Android (Old Architecture)
    steps:
      - uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install

      - name: Library Build
        run: pnpm nx run-many --target=build --projects='packages/*,plugins/*'

      - name: Build Android
        run: cd examples/v0.74.1/android && ./gradlew assembleDebug --build-cache && cd ../..
        env:
          HOT_UPDATER_CHANNEL: dev
