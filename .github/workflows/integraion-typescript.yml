on:
  push:
    branches:
      - main
  pull_request:

name: Integration

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.x"
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"
      - run: pnpm install
      - name: Build
        run: pnpm build

      - name: TypeScript type check
        run: pnpm test:type

      - name: Biome check
        run: pnpm lint
      - name: Unit test
        run: pnpm test
      - name: Integration test
        run: pnpm test:integration
