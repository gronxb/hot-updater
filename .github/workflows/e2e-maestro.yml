name: Maestro E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/e2e-maestro.yml"
      - "examples/v0.81.0/**"
      - "examples-server/hono-e2e-local/**"
      - "packages/hot-updater/**"
      - "packages/react-native/**"
      - "packages/server/**"
      - "plugins/**"

env:
  MAESTRO_CLI_NO_ANALYTICS: "true"

jobs:
  ios:
    name: iOS Maestro E2E
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - name: Build Workspace
        run: pnpm -w build

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          "$HOME/.maestro/bin/maestro" --version

      - name: Run iOS Maestro E2E
        run: bash examples/v0.81.0/scripts/e2e/run-ios-maestro.sh

      - name: Upload iOS E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-e2e-ios
          path: examples/v0.81.0/.maestro/results/ios

  android:
    name: Android Maestro E2E
    runs-on: ubuntu-latest
    needs: ios
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Workspace
        run: pnpm -w build

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          "$HOME/.maestro/bin/maestro" --version

      - name: Run Android Maestro E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: bash examples/v0.81.0/scripts/e2e/run-android-maestro.sh

      - name: Upload Android E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-e2e-android
          path: examples/v0.81.0/.maestro/results/android
