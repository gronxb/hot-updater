on:
  push:
    branches:
      - main
    paths:
      - "packages/react-native/ios/**"
  pull_request:
    paths:
      - "packages/react-native/ios/**"

name: iOS Integration

jobs:
  build-new-arch:
    runs-on: macos-15
    name: Build iOS (New Architecture)
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b
      - name: Setup Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af
        with:
          ruby-version: "3.2"
      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --config.node-linker=hoisted
      - name: Install Ruby dependencies
        working-directory: examples/v0.76.1-new-arch
        run: bundle install

      - name: Library Build
        run: pnpm nx run @hot-updater/react-native:build

      - name: Swift Tests
        run: pnpm test:swift

      - name: Build iOS
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          cd examples/v0.76.1-new-arch
          rm -f ios/Podfile.lock
          install_pods() {
            for attempt in 1 2 3; do
              if bundle exec pod install --project-directory=ios; then
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                return 1
              fi
              echo "pod install failed; retrying ($attempt/3)"
              rm -rf ios/Pods ios/Podfile.lock
            done
          }
          install_pods
          xcodebuild -workspace ios/HotUpdaterExample.xcworkspace -scheme HotUpdaterExample -configuration Release -sdk iphonesimulator
          cd ../..
        env:
          HOT_UPDATER_CHANNEL: dev

  build-old-arch:
    runs-on: macos-15
    name: Build iOS (Old Architecture)
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b
      - name: Setup Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af
        with:
          ruby-version: "3.2"
      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --config.node-linker=hoisted
      - name: Install Ruby dependencies
        working-directory: examples/v0.74.1
        run: bundle install

      - name: Library Build
        run: pnpm nx run @hot-updater/react-native:build

      - name: Swift Tests
        run: pnpm test:swift

      - name: Build iOS
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          cd examples/v0.74.1
          rm -f ios/Podfile.lock
          install_pods() {
            for attempt in 1 2 3; do
              if bundle exec pod install --project-directory=ios; then
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                return 1
              fi
              echo "pod install failed; retrying ($attempt/3)"
              rm -rf ios/Pods ios/Podfile.lock
            done
          }
          install_pods
          xcodebuild -workspace ios/HotUpdaterExample.xcworkspace -scheme HotUpdaterExample -configuration Release -sdk iphonesimulator
          cd ../..
        env:
          HOT_UPDATER_CHANNEL: dev
