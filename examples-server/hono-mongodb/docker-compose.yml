services:
  mongodb:
    image: mongo:7-jammy
    container_name: hono-mongodb
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'try { if (!db.hello().setName) { rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"localhost:27017\"}]}); quit(1); } quit(db.hello().isWritablePrimary ? 0 : 1); } catch (error) { try { rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"localhost:27017\"}]}); } catch (initError) {} quit(1); }'",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
