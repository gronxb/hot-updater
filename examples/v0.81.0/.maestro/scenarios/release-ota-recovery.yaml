name: release-ota-recovery
platforms:
  ios:
    appId: org.reactjs.native.example.HotUpdaterExample
    simulatorName: iPhone 16
    derivedDataPath: /tmp/hotupdater-v081-ios-maestro
  android:
    appId: com.hotupdaterexample
    apkPath: android/app/build/outputs/apk/release/app-release.apk
phases:
  - id: bootstrap
    patch:
      mode: reset
      marker:
        ios: builtin-ios-maestro
        android: builtin-android-maestro
    steps:
      - action: prepareRelease
      - action: buildRelease
      - action: installRelease
      - action: launch
      - action: captureBuiltInBundleId
        saveAs: builtInBundleId
  - id: stable
    patch:
      mode: reset
      marker:
        ios: stable-ios-maestro
        android: stable-android-maestro
    steps:
      - action: deploy
        reportPrefix: stable
        saveAs: stableBundleId
        targetVersion: 1.0.x
      - action: launch
      - action: waitForMetadata
        bundleId: "{{ stableBundleId }}"
        verificationPending: true
      - action: launch
      - action: maestroFlow
        reportPrefix: stable
        flow:
          label: Assert stable runtime
          env:
            EXPECTED_BUNDLE_ID: "{{ stableBundleId }}"
            EXPECTED_MARKER: "{{ phase.marker }}"
            EXPECTED_CRASH_HISTORY_TEXT: No crashed bundles recorded\.
          commands:
            - extendedWaitUntil:
                visible: Runtime Snapshot
                timeout: 120000
            - assertVisible: ${EXPECTED_BUNDLE_ID}
            - assertVisible: ${EXPECTED_MARKER}
            - scrollUntilVisible:
                element: Launch Status
                direction: DOWN
                timeout: 20000
            - assertVisible: Launch Status
            - scrollUntilVisible:
                element: ${EXPECTED_CRASH_HISTORY_TEXT}
                direction: DOWN
                timeout: 20000
            - assertVisible: ${EXPECTED_CRASH_HISTORY_TEXT}
      - action: captureState
        prefix: stable
        defaultCrashHistory:
          bundles: []
          maxHistorySize: 10
      - action: assertMetadataActive
        bundleId: "{{ stableBundleId }}"
      - action: assertLaunchReport
        status: STABLE
        optional: true
  - id: recovered
    patch:
      mode: crash
      marker:
        ios: stable-ios-maestro
        android: stable-android-maestro
      safeBundleIds:
        - "{{ builtInBundleId }}"
        - "{{ stableBundleId }}"
    steps:
      - action: deploy
        reportPrefix: crash
        saveAs: crashBundleId
        targetVersion: 1.0.x
      - action: launch
      - action: waitForMetadata
        bundleId: "{{ crashBundleId }}"
        verificationPending: true
      - action: launch
      - action: sleep
        seconds: 8
      - action: launch
      - action: maestroFlow
        reportPrefix: recovered
        flow:
          label: Assert recovered runtime
          env:
            EXPECTED_ACTIVE_BUNDLE_ID: "{{ stableBundleId }}"
            EXPECTED_MARKER: "{{ phase.marker }}"
            EXPECTED_CRASHED_BUNDLE_ID: "{{ crashBundleId }}"
          commands:
            - extendedWaitUntil:
                visible: Runtime Snapshot
                timeout: 120000
            - assertVisible: ${EXPECTED_ACTIVE_BUNDLE_ID}
            - assertVisible: ${EXPECTED_MARKER}
            - scrollUntilVisible:
                element: Launch Status
                direction: DOWN
                timeout: 20000
            - assertVisible: Launch Status
            - assertVisible: ${EXPECTED_CRASHED_BUNDLE_ID}
            - scrollUntilVisible:
                element: Clear Crash History
                direction: DOWN
                timeout: 20000
            - assertVisible: Clear Crash History
      - action: captureState
        prefix: recovered
      - action: assertMetadataActive
        bundleId: "{{ stableBundleId }}"
      - action: assertLaunchReport
        status: RECOVERED
        crashedBundleId: "{{ crashBundleId }}"
        optional: true
      - action: assertCrashHistoryContains
        bundleId: "{{ crashBundleId }}"
summary:
  status: RECOVERED
  fields:
    builtInBundleId: "{{ builtInBundleId }}"
    stableBundleId: "{{ stableBundleId }}"
    crashBundleId: "{{ crashBundleId }}"
