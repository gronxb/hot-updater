appId: ${APP_ID}
env:
  CONTROL_URL: ${CONTROL_URL}
  SCENARIO_NAME: bspatch-ota
  PATCH_CHANNEL: production
  BASE_MARKER: bspatch-base-maestro
  PATCH_MARKER: bspatch-target-maestro
  TARGET_APP_VERSION: 1.0.x
onFlowStart:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: bootstrap
        CONTROL_URL: ${CONTROL_URL}
onFlowComplete:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: cleanup
        CONTROL_URL: ${CONTROL_URL}
---
# Install the base OTA from the built-in bundle. This should use the archive path.
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureBuiltInBundleId
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${BASE_MARKER}
      MESSAGE: Maestro bspatch base bundle
      MODE: reset
      OUTPUT_KEY: baseBundleId
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.baseBundleId}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertFirstOtaUsesArchive
      BUNDLE_ID: ${output.baseBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.baseBundleId}
      EXPECTED_MARKER: ${BASE_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.baseBundleId}
      CONTROL_URL: ${CONTROL_URL}
# Install a derived OTA and verify the native bspatch path.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      DIFF_BASE_BUNDLE_ID: ${output.baseBundleId}
      MARKER: ${PATCH_MARKER}
      MESSAGE: Maestro bspatch target bundle
      MODE: reset
      OUTPUT_KEY: patchBundleId
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.patchBundleId}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertBsdiffPatchApplied
      ASSET_PATH: ${output.patchBundleIdDiffPatchAssetPath}
      BASE_BUNDLE_ID: ${output.baseBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.patchBundleId}
      EXPECTED_MARKER: ${PATCH_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runFlow:
    file: subflows/assert-empty-crash-history.yaml
    env:
      APP_ID: ${APP_ID}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: bspatch
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.patchBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: writeSummary
      CONTROL_URL: ${CONTROL_URL}
      SCENARIO: ${SCENARIO_NAME}
      STATUS: PASSED
