appId: ${APP_ID}
---
- scrollUntilVisible:
    element:
      id: ${FIELD_ID}
    direction: DOWN
    timeout: 20000
- tapOn:
    id: ${FIELD_ID}
- eraseText
- inputText: ${FIELD_VALUE}
- pressKey: Enter
- copyTextFrom:
    id: ${FIELD_ID}
- assertTrue:
    condition: ${maestro.copiedText == FIELD_VALUE}
    label: ${FIELD_LABEL} matches expected value
