appId: ${APP_ID}
---
- runFlow:
    file: navigate-actions.yaml
    env:
      APP_ID: ${APP_ID}
- retry:
    maxRetries: 3
    commands:
      - scrollUntilVisible:
          element:
            id: ${FIELD_ID}
          direction: DOWN
          timeout: 10000
      - assertVisible:
          id: ${FIELD_ID}
      - tapOn:
          id: ${FIELD_ID}
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 500
- eraseText: 64
- inputText: ${FIELD_VALUE}
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 500
- retry:
    maxRetries: 3
    commands:
      - assertVisible:
          id: ${FIELD_ID}
      - copyTextFrom:
          id: ${FIELD_ID}
      - assertTrue:
          condition: ${maestro.copiedText == FIELD_VALUE}
          label: ${FIELD_LABEL} matches expected value
- runFlow:
    file: tap-action-button.yaml
    env:
      APP_ID: ${APP_ID}
      BUTTON_ID: action-apply-cohort-input
