appId: ${APP_ID}
---
- runFlow:
    file: navigate-actions.yaml
    env:
      APP_ID: ${APP_ID}
- retry:
    maxRetries: 3
    commands:
      - scrollUntilVisible:
          element:
            id: ${FIELD_ID}
          direction: DOWN
          timeout: 10000
      - assertVisible:
          id: ${FIELD_ID}
      - tapOn:
          id: ${FIELD_ID}
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 500
      - eraseText: 64
      - setClipboard: ${FIELD_VALUE}
      - pasteText
      - waitForAnimationToEnd:
          timeout: 1000
      - tapOn:
          id: e2e-nav-actions
          optional: true
      - waitForAnimationToEnd:
          timeout: 1000
      - scrollUntilVisible:
          element:
            id: ${FIELD_ID}
          direction: DOWN
          timeout: 10000
      - assertVisible:
          id: ${FIELD_ID}
      - copyTextFrom:
          id: ${FIELD_ID}
      - assertTrue:
          condition: ${maestro.copiedText.trim() === FIELD_VALUE}
          label: Text input matches requested value
- runScript:
    file: ../../scripts/control.js
    env:
      ACTION: sleep
      CONTROL_URL: ${CONTROL_URL}
      SECONDS: "1"
- retry:
    maxRetries: 3
    commands:
      - scrollUntilVisible:
          element:
            id: action-apply-cohort-input
          direction: DOWN
          timeout: 10000
      - extendedWaitUntil:
          visible:
            id: action-apply-cohort-input
          timeout: 10000
      - tapOn:
          id: action-apply-cohort-input
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 500
- runScript:
    file: ../../scripts/control.js
    env:
      ACTION: sleep
      CONTROL_URL: ${CONTROL_URL}
      SECONDS: "1"
