appId: ${APP_ID}
---
- retry:
    maxRetries: 5
    commands:
      - tapOn:
          id: android:id/aerr_wait
          optional: true
      - tapOn:
          text: Wait
          optional: true
      - extendedWaitUntil:
          visible:
            id: launch-status-result
          timeout: 10000
      - copyTextFrom:
          id: launch-status-result
      - assertTrue:
          condition: ${maestro.copiedText.includes(EXPECTED_LAUNCH_STATUS)}
          label: Launch status summary matches expected value
