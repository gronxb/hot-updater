appId: ${APP_ID}
---
- runScript:
    file: ../../scripts/control.js
    env:
      ACTION: prepareAppLaunch
      CONTROL_URL: ${CONTROL_URL}
- launchApp
- waitForAnimationToEnd:
    timeout: 1000
- retry:
    maxRetries: 5
    commands:
      - launchApp
      - waitForAnimationToEnd:
          timeout: 1000
      - runScript:
          file: ../../scripts/control.js
          env:
            ACTION: ensureAppForeground
            CONTROL_URL: ${CONTROL_URL}
      - tapOn:
          id: android:id/aerr_wait
          optional: true
      - tapOn:
          text: Wait
          optional: true
      - waitForAnimationToEnd:
          timeout: 500
      - tapOn:
          id: android:id/aerr_wait
          optional: true
      - tapOn:
          text: Wait
          optional: true
      - extendedWaitUntil:
          visible:
            id: runtime-bundle-id
          timeout: 15000
      - assertVisible:
          id: runtime-bundle-id
