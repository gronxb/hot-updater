appId: ${APP_ID}
---
- runFlow:
    file: tap-action-button.yaml
    env:
      APP_ID: ${APP_ID}
      BUTTON_ID: action-clear-crash-history
- waitForAnimationToEnd:
    timeout: 500
- runFlow:
    file: navigate-crash-history.yaml
    env:
      APP_ID: ${APP_ID}
- runFlow:
    file: assert-empty-crash-history.yaml
    env:
      APP_ID: ${APP_ID}
