appId: ${APP_ID}
---
- runFlow:
    file: navigate-action-results.yaml
    env:
      APP_ID: ${APP_ID}
- runFlow:
    file: assert-text-by-id.yaml
    env:
      APP_ID: ${APP_ID}
      ASSERTION_LABEL: Update action result matches expected value
      EXPECTED_TEXT: ${EXPECTED_UPDATE_ACTION_RESULT}
      TARGET_ID: update-action-result
