appId: ${APP_ID}
---
- runFlow:
    file: navigate-action-results.yaml
- retry:
    maxRetries: 5
    commands:
      - assertVisible:
          id: update-action-result
      - copyTextFrom:
          id: update-action-result
      - assertTrue:
          condition: ${maestro.copiedText.startsWith(EXPECTED_UPDATE_ACTION_RESULT)}
          label: Update action result matches expected value
