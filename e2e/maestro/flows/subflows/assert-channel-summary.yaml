appId: ${APP_ID}
---
- runFlow:
    file: navigate-actions.yaml
    env:
      APP_ID: ${APP_ID}
- retry:
    maxRetries: 3
    commands:
      - assertVisible:
          id: current-channel-summary
      - copyTextFrom:
          id: current-channel-summary
      - assertTrue:
          condition: ${maestro.copiedText.includes(EXPECTED_CHANNEL_SUMMARY)}
          label: Current channel summary matches expected value
