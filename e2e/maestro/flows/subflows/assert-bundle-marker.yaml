appId: ${APP_ID}
---
- runScript:
    file: ../../scripts/control.js
    env:
      ACTION: ensureAppForeground
      CONTROL_URL: ${CONTROL_URL}
- scrollUntilVisible:
    element:
      id: runtime-scenario-marker
    direction: UP
    timeout: 120000
- extendedWaitUntil:
    visible: ${EXPECTED_MARKER}
    timeout: 10000
- copyTextFrom:
    id: runtime-scenario-marker
- assertTrue:
    condition: ${maestro.copiedText.includes(EXPECTED_MARKER)}
    label: Runtime scenario marker matches expected value
