appId: ${APP_ID}
---
- runScript:
    file: ../../scripts/control.js
    env:
      ACTION: ensureAppForeground
      CONTROL_URL: ${CONTROL_URL}
- scrollUntilVisible:
    element:
      id: runtime-bundle-id
    direction: UP
    timeout: 10000
- retry:
    maxRetries: 3
    commands:
      - assertVisible:
          id: runtime-bundle-id
          text: ".*${EXPECTED_BUNDLE_ID}.*"
      - assertVisible:
          id: runtime-bundle-id
      - scrollUntilVisible:
          element:
            id: runtime-scenario-marker
          direction: DOWN
          timeout: 10000
      - assertVisible:
          id: runtime-scenario-marker
          text: ".*${EXPECTED_MARKER}.*"
      - assertVisible:
          id: runtime-scenario-marker
