appId: ${APP_ID}
---
- runFlow:
    file: navigate-actions.yaml
    env:
      APP_ID: ${APP_ID}
- retry:
    maxRetries: 3
    commands:
      - runScript:
          file: ../../scripts/control.js
          env:
            ACTION: ensureAppForeground
            CONTROL_URL: ${CONTROL_URL}
      - tapOn:
          id: e2e-nav-top
          optional: true
      - waitForAnimationToEnd:
          timeout: 500
      - scrollUntilVisible:
          element:
            id: current-cohort-summary
          direction: DOWN
          timeout: 10000
      - assertVisible:
          id: current-cohort-summary
      - copyTextFrom:
          id: current-cohort-summary
      - assertTrue:
          condition: ${maestro.copiedText.includes(EXPECTED_COHORT_TEXT)}
          label: Current cohort summary matches expected value
