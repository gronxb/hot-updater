appId: ${APP_ID}
---
- scrollUntilVisible:
    element:
      id: current-cohort-summary
    direction: UP
    timeout: 20000
- copyTextFrom:
    id: current-cohort-summary
- assertTrue:
    condition: ${maestro.copiedText.startsWith(EXPECTED_COHORT_TEXT)}
    label: Current cohort summary matches expected value
