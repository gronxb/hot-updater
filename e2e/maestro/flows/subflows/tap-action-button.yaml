appId: ${APP_ID}
---
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: android:id/aerr_wait
          optional: true
      - tapOn:
          text: Wait
          optional: true
      - tapOn:
          id: e2e-nav-actions
          optional: true
      - extendedWaitUntil:
          visible:
            id: ${BUTTON_ID}
          timeout: 10000
      - tapOn:
          id: ${BUTTON_ID}
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 500
      - tapOn:
          id: android:id/aerr_wait
          optional: true
      - tapOn:
          text: Wait
          optional: true
      - runFlow:
          file: navigate-actions.yaml
          env:
            APP_ID: ${APP_ID}
      - extendedWaitUntil:
          visible:
            id: current-channel-summary
          timeout: 10000
