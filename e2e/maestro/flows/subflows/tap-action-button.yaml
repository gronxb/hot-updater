appId: ${APP_ID}
---
- runFlow:
    file: navigate-actions.yaml
    env:
      APP_ID: ${APP_ID}
- scrollUntilVisible:
    direction: DOWN
    element:
      id: ${BUTTON_ID}
    timeout: 10000
    visibilityPercentage: 50
- extendedWaitUntil:
    visible:
      id: ${BUTTON_ID}
    timeout: 10000
- tapOn:
    id: ${BUTTON_ID}
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 2000
