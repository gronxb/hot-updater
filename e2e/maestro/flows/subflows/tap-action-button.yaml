appId: ${APP_ID}
---
- runFlow:
    file: navigate-actions.yaml
    env:
      APP_ID: ${APP_ID}
- retry:
    maxRetries: 3
    commands:
      - scrollUntilVisible:
          element:
            id: ${BUTTON_ID}
          direction: DOWN
          timeout: 10000
      - assertVisible:
          id: ${BUTTON_ID}
      - tapOn:
          id: ${BUTTON_ID}
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 500
