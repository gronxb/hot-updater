appId: ${APP_ID}
---
- scrollUntilVisible:
    element:
      id: e2e-nav-action-results
    direction: UP
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: e2e-nav-action-results
    timeout: 10000
- tapOn:
    id: e2e-nav-action-results
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd:
    timeout: 500
- extendedWaitUntil:
    visible:
      id: section-action-results
    timeout: 10000
