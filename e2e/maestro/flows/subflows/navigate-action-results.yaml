appId: ${APP_ID}
---
- tapOn:
    id: e2e-nav-action-results
    optional: true
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd:
    timeout: 500
- scrollUntilVisible:
    element:
      id: section-action-results
    direction: DOWN
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: section-action-results
    timeout: 10000
