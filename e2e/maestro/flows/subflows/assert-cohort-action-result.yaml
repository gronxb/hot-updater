appId: ${APP_ID}
---
- runFlow:
    file: assert-text-by-id.yaml
    env:
      ANCHOR_TEXT: "Restore Initial Cohort"
      APP_ID: ${APP_ID}
      ASSERTION_LABEL: Cohort action result matches expected value
      EXPECTED_TEXT: ${EXPECTED_COHORT_ACTION_RESULT}
      TARGET_ID: cohort-action-result
