appId: ${APP_ID}
---
- runFlow:
    file: assert-text-by-id.yaml
    env:
      ANCHOR_TEXT: "Launch Status"
      APP_ID: ${APP_ID}
      ASSERTION_LABEL: Crashed bundle summary includes expected bundle id
      EXPECTED_TEXT: ${EXPECTED_CRASHED_BUNDLE_ID}
      TARGET_ID: launch-crashed-bundle-result
