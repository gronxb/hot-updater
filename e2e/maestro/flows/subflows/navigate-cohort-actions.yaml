appId: ${APP_ID}
---
- scrollUntilVisible:
    element:
      id: e2e-nav-cohort-actions
    direction: UP
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: e2e-nav-cohort-actions
    timeout: 10000
- tapOn:
    id: e2e-nav-cohort-actions
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd:
    timeout: 500
- extendedWaitUntil:
    visible:
      id: section-cohort-actions
    timeout: 10000
