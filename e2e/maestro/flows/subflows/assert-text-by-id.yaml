appId: ${APP_ID}
---
- retry:
    maxRetries: 3
    commands:
      - scrollUntilVisible:
          element:
            id: ${TARGET_ID}
          direction: DOWN
          timeout: 10000
      - assertVisible:
          id: ${TARGET_ID}
      - copyTextFrom:
          id: ${TARGET_ID}
      - assertTrue:
          condition: ${maestro.copiedText.includes(EXPECTED_TEXT)}
          label: ${ASSERTION_LABEL}
