appId: ${APP_ID}
---
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: android:id/aerr_wait
          optional: true
      - tapOn:
          text: Wait
          optional: true
      - waitForAnimationToEnd:
          timeout: 500
      - scrollUntilVisible:
          element:
            id: ${TARGET_ID}
          direction: DOWN
          timeout: 10000
      - assertVisible:
          id: ${TARGET_ID}
      - copyTextFrom:
          id: ${TARGET_ID}
      - assertTrue:
          condition: ${maestro.copiedText.includes(EXPECTED_TEXT)}
          label: ${ASSERTION_LABEL}
