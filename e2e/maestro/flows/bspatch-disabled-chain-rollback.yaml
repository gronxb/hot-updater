appId: ${APP_ID}
env:
  CONTROL_URL: ${CONTROL_URL}
  SCENARIO_NAME: bspatch-disabled-chain-rollback
  PATCH_CHANNEL: production
  TARGET_APP_VERSION: 1.0.x
  PHASE2_A_MARKER: bspatch-a-second-maestro
  PHASE2_B_MARKER: bspatch-b-second-maestro
  PHASE2_C_MARKER: bspatch-c-from-b-maestro
onFlowStart:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: bootstrap
        CONTROL_URL: ${CONTROL_URL}
onFlowComplete:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: cleanup
        CONTROL_URL: ${CONTROL_URL}
---
# Capture the built-in baseline before the OTA chain starts.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: reinstallBuiltInApp
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureBuiltInBundleId
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: resetLocalAppState
      CONTROL_URL: ${CONTROL_URL}
# Phase 2: build A -> B -> C and verify B -> C uses a bsdiff patch with
# maxBaseBundles=2. The consecutive C -> D patch chain is covered by
# bspatch-consecutive-diff-ota; this flow keeps the disabled rollback chain
# under Maestro's Android per-flow limit while preserving suite coverage.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${PHASE2_A_MARKER}
      MESSAGE: Maestro bspatch phase2 bundle A
      MODE: reset
      OUTPUT_KEY: phase2A
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/tap-action-button.yaml
    env:
      APP_ID: ${APP_ID}
      BUTTON_ID: action-install-current-channel-update
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.phase2A}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertFirstOtaUsesArchive
      BUNDLE_ID: ${output.phase2A}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.phase2A}
      EXPECTED_MARKER: ${PHASE2_A_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${PHASE2_B_MARKER}
      MESSAGE: Maestro bspatch phase2 bundle B
      MODE: reset
      OUTPUT_KEY: phase2B
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/tap-action-button.yaml
    env:
      APP_ID: ${APP_ID}
      BUTTON_ID: action-install-current-channel-update
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.phase2B}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.phase2B}
      EXPECTED_MARKER: ${PHASE2_B_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      DIFF_BASE_BUNDLE_ID: ${output.phase2B}
      MARKER: ${PHASE2_C_MARKER}
      MESSAGE: Maestro bspatch phase2 bundle C
      MODE: reset
      OUTPUT_KEY: phase2C
      PATCH_MAX_BASE_BUNDLES: "2"
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertBundlePatchBases
      BUNDLE_ID: ${output.phase2C}
      CONTROL_URL: ${CONTROL_URL}
      EXPECTED_BASE_BUNDLE_IDS: ${output.phase2B},${output.phase2A}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/tap-action-button.yaml
    env:
      APP_ID: ${APP_ID}
      BUTTON_ID: action-install-current-channel-update
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.phase2C}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runFlow:
    file: subflows/assert-update-store-download.yaml
    env:
      APP_ID: ${APP_ID}
      BUNDLE_ID: ${output.phase2C}
      EXPECTED_ARTIFACT_TYPE: diff
      EXPECTED_DOWNLOAD_PATH: ${output.phase2CPrimaryBundleAssetPath}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertBsdiffPatchApplied
      ASSET_PATH: ${output.phase2CDiffPatchAssetPath}
      BASE_BUNDLE_ID: ${output.phase2B}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.phase2C}
      EXPECTED_MARKER: ${PHASE2_C_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runFlow:
    file: subflows/assert-empty-crash-history.yaml
    env:
      APP_ID: ${APP_ID}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: bspatch-b-to-c
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.phase2C}
      CONTROL_URL: ${CONTROL_URL}
# Disable the active chain one bundle at a time. This proves the native runtime
# can roll back from bsdiff-applied OTAs through the installed chain and finally
# clear OTA metadata when every candidate is disabled.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: patchBundle
      BUNDLE_ID: ${output.phase2C}
      CONTROL_URL: ${CONTROL_URL}
      ENABLED: "false"
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.phase2B}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "false"
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.phase2B}
      EXPECTED_MARKER: ${PHASE2_B_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runFlow:
    file: subflows/assert-crashed-bundle-result.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_CRASHED_BUNDLE_RESULT: "Current Crashed Bundle ID: null"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.phase2B}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: patchBundle
      BUNDLE_ID: ${output.phase2B}
      CONTROL_URL: ${CONTROL_URL}
      ENABLED: "false"
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.phase2A}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "false"
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.phase2A}
      EXPECTED_MARKER: ${PHASE2_A_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runFlow:
    file: subflows/assert-crashed-bundle-result.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_CRASHED_BUNDLE_RESULT: "Current Crashed Bundle ID: null"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.phase2A}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: patchBundle
      BUNDLE_ID: ${output.phase2A}
      CONTROL_URL: ${CONTROL_URL}
      ENABLED: "false"
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataReset
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runFlow:
    file: subflows/assert-crashed-bundle-result.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_CRASHED_BUNDLE_RESULT: "Current Crashed Bundle ID: null"
- runFlow:
    file: subflows/assert-empty-crash-history.yaml
    env:
      APP_ID: ${APP_ID}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: bspatch-disabled-chain-to-builtin
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataReset
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: writeSummary
      CONTROL_URL: ${CONTROL_URL}
      SCENARIO: ${SCENARIO_NAME}
      STATUS: PASSED
