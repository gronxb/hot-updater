appId: ${APP_ID}
env:
  CONTROL_URL: ${CONTROL_URL}
  SCENARIO_NAME: bspatch-manifest-diff-fallback
  PATCH_CHANNEL: production
  TARGET_APP_VERSION: 1.0.x
  PHASE3_A_MARKER: bspatch-a-third-maestro
  PHASE3_B_MARKER: bspatch-b-third-maestro
  PHASE3_C_MARKER: bspatch-c-manifest-diff-maestro
onFlowStart:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: bootstrap
        CONTROL_URL: ${CONTROL_URL}
onFlowComplete:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: cleanup
        CONTROL_URL: ${CONTROL_URL}
---
# Capture the built-in baseline before the OTA chain starts.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: reinstallBuiltInApp
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureBuiltInBundleId
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: resetLocalAppState
      CONTROL_URL: ${CONTROL_URL}
# Phase 3: built-in -> A uses archive, C only gets a patch from B because of
# maxBaseBundles=1, and an A client must fall back to pure manifest diff.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${PHASE3_A_MARKER}
      MESSAGE: Maestro bspatch phase3 bundle A
      MODE: reset
      OUTPUT_KEY: phase3A
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.phase3A}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertFirstOtaUsesArchive
      BUNDLE_ID: ${output.phase3A}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.phase3A}
      EXPECTED_MARKER: ${PHASE3_A_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${PHASE3_B_MARKER}
      MESSAGE: Maestro bspatch phase3 bundle B
      MODE: reset
      OUTPUT_KEY: phase3B
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${PHASE3_C_MARKER}
      MESSAGE: Maestro bspatch phase3 bundle C manifest diff fallback
      MODE: reset
      OUTPUT_KEY: phase3C
      PATCH_MAX_BASE_BUNDLES: "1"
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertBundlePatchBases
      ABSENT_BASE_BUNDLE_IDS: ${output.phase3A}
      BUNDLE_ID: ${output.phase3C}
      CONTROL_URL: ${CONTROL_URL}
      EXPECTED_BASE_BUNDLE_IDS: ${output.phase3B}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.phase3C}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runFlow:
    file: subflows/assert-update-store-download.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_ARTIFACT_TYPE: diff
      EXPECTED_DOWNLOAD_PATH: ${output.phase3CPrimaryBundleAssetPath}.br
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertManifestDiffApplied
      BUNDLE_ID: ${output.phase3C}
      CONTROL_URL: ${CONTROL_URL}
      PREVIOUS_BUNDLE_ID: ${output.phase3A}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.phase3C}
      EXPECTED_MARKER: ${PHASE3_C_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runFlow:
    file: subflows/assert-empty-crash-history.yaml
    env:
      APP_ID: ${APP_ID}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: bspatch-manifest-diff
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.phase3C}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: writeSummary
      CONTROL_URL: ${CONTROL_URL}
      SCENARIO: ${SCENARIO_NAME}
      STATUS: PASSED
