appId: ${APP_ID}
env:
  CONTROL_URL: ${CONTROL_URL}
  SCENARIO_NAME: disabled-bundle-rollback-to-builtin
  ROLLBACK_CHANNEL: production
  CURRENT_MARKER: disabled-current-maestro
  TARGET_APP_VERSION: 1.0.x
onFlowStart:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: bootstrap
        CONTROL_URL: ${CONTROL_URL}
onFlowComplete:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: cleanup
        CONTROL_URL: ${CONTROL_URL}
---
# Verify the built-in bundle before the disabled rollback scenario starts.
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureBuiltInBundleId
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}
# Install the current OTA and confirm it is active before disabling it.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${ROLLBACK_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${CURRENT_MARKER}
      MESSAGE: Maestro disabled rollback current bundle
      MODE: reset
      OUTPUT_KEY: currentBundleId
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.currentBundleId}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.currentBundleId}
      EXPECTED_MARKER: ${CURRENT_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.currentBundleId}
      CONTROL_URL: ${CONTROL_URL}
# Disable the active OTA and verify rollback to the built-in bundle.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: patchBundle
      BUNDLE_ID: ${output.currentBundleId}
      CONTROL_URL: ${CONTROL_URL}
      ENABLED: "false"
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runFlow:
    file: subflows/assert-crashed-bundle-result.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_CRASHED_BUNDLE_RESULT: "Current Crashed Bundle ID: null"
- runFlow:
    file: subflows/assert-empty-crash-history.yaml
    env:
      APP_ID: ${APP_ID}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: rollback-to-builtin
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataReset
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: writeSummary
      CONTROL_URL: ${CONTROL_URL}
      SCENARIO: ${SCENARIO_NAME}
      STATUS: ROLLBACK_TO_BUILTIN
