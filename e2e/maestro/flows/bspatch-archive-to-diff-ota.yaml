appId: ${APP_ID}
env:
  CONTROL_URL: ${CONTROL_URL}
  SCENARIO_NAME: bspatch-archive-to-diff-ota
  PATCH_CHANNEL: production
  TARGET_APP_VERSION: 1.0.x
  PHASE1_A_MARKER: bspatch-a-maestro
  PHASE1_B_MARKER: bspatch-b-maestro
  PHASE1_C_MARKER: bspatch-c-from-a-maestro
onFlowStart:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: bootstrap
        CONTROL_URL: ${CONTROL_URL}
onFlowComplete:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: cleanup
        CONTROL_URL: ${CONTROL_URL}
---
# Capture the built-in baseline before the OTA chain starts.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: reinstallBuiltInApp
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureBuiltInBundleId
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: resetLocalAppState
      CONTROL_URL: ${CONTROL_URL}
# Phase 1: built-in -> A uses archive, then A -> C uses a bsdiff patch while C
# still carries patches for both B and A.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${PHASE1_A_MARKER}
      MESSAGE: Maestro bspatch phase1 bundle A
      MODE: reset
      OUTPUT_KEY: phase1A
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.phase1A}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertFirstOtaUsesArchive
      BUNDLE_ID: ${output.phase1A}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.phase1A}
      EXPECTED_MARKER: ${PHASE1_A_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.phase1A}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${PHASE1_B_MARKER}
      MESSAGE: Maestro bspatch phase1 bundle B
      MODE: reset
      OUTPUT_KEY: phase1B
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${PATCH_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      DIFF_BASE_BUNDLE_ID: ${output.phase1A}
      MARKER: ${PHASE1_C_MARKER}
      MESSAGE: Maestro bspatch phase1 bundle C
      MODE: reset
      OUTPUT_KEY: phase1C
      PATCH_MAX_BASE_BUNDLES: "2"
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertBundlePatchBases
      BUNDLE_ID: ${output.phase1C}
      CONTROL_URL: ${CONTROL_URL}
      EXPECTED_BASE_BUNDLE_IDS: ${output.phase1B},${output.phase1A}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.phase1C}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runFlow:
    file: subflows/assert-update-store-download.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_ARTIFACT_TYPE: diff
      EXPECTED_DOWNLOAD_PATH: ${output.phase1CPrimaryBundleAssetPath}
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertBsdiffPatchApplied
      ASSET_PATH: ${output.phase1CDiffPatchAssetPath}
      BASE_BUNDLE_ID: ${output.phase1A}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.phase1C}
      EXPECTED_MARKER: ${PHASE1_C_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runFlow:
    file: subflows/assert-empty-crash-history.yaml
    env:
      APP_ID: ${APP_ID}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: bspatch-a-to-c
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.phase1C}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: writeSummary
      CONTROL_URL: ${CONTROL_URL}
      SCENARIO: ${SCENARIO_NAME}
      STATUS: PASSED
