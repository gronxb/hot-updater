appId: ${APP_ID}
env:
  CONTROL_URL: ${CONTROL_URL}
  SCENARIO_NAME: multi-asset-replacement
  ASSET_CHANNEL: production
  TARGET_APP_VERSION: 1.0.x
  FIRST_MARKER: multi-assets-a-maestro
  SECOND_MARKER: multi-assets-b-maestro
  MULTI_ASSET_PATHS: assets/src/test/_fixture-multi-asset-a.bmp,assets/src/test/_fixture-multi-asset-b.bmp,assets/src/test/_fixture-multi-asset-c.bmp
onFlowStart:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: bootstrap
        CONTROL_URL: ${CONTROL_URL}
onFlowComplete:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: cleanup
        CONTROL_URL: ${CONTROL_URL}
---
# Baseline starts without the generated multi-asset fixtures.
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureBuiltInBundleId
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}

# Deploy A with three generated assets and verify each manifest entry is stored.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      BUNDLE_PROFILE: multiAssetReplacement
      CHANNEL: ${ASSET_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${FIRST_MARKER}
      MESSAGE: Maestro multi asset bundle A
      MODE: reset
      OUTPUT_KEY: firstBundleId
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/tap-action-button.yaml
    env:
      APP_ID: ${APP_ID}
      BUTTON_ID: action-install-current-channel-update
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.firstBundleId}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.firstBundleId}
      EXPECTED_MARKER: ${FIRST_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertBundleAssetsStored
      ASSET_PATHS: ${MULTI_ASSET_PATHS}
      BUNDLE_ID: ${output.firstBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.firstBundleId}
      CONTROL_URL: ${CONTROL_URL}

# Deploy B with the same asset paths but different bytes and verify all hashes move.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      BUNDLE_PROFILE: multiAssetReplacement
      CHANNEL: ${ASSET_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${SECOND_MARKER}
      MESSAGE: Maestro multi asset bundle B
      MODE: reset
      OUTPUT_KEY: secondBundleId
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/tap-action-button.yaml
    env:
      APP_ID: ${APP_ID}
      BUTTON_ID: action-install-current-channel-update
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.secondBundleId}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runFlow:
    file: subflows/restart-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.secondBundleId}
      EXPECTED_MARKER: ${SECOND_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMultipleAssetsReplaced
      ASSET_PATHS: ${MULTI_ASSET_PATHS}
      BUNDLE_ID: ${output.secondBundleId}
      CONTROL_URL: ${CONTROL_URL}
      PREVIOUS_BUNDLE_ID: ${output.firstBundleId}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: multi-assets-replaced
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.secondBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: writeSummary
      CONTROL_URL: ${CONTROL_URL}
      SCENARIO: ${SCENARIO_NAME}
      STATUS: MULTI_ASSETS_REPLACED
