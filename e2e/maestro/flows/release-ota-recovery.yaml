appId: ${APP_ID}
env:
  CONTROL_URL: ${CONTROL_URL}
  SCENARIO_NAME: release-ota-recovery
  STABLE_CHANNEL: production
  STABLE_MARKER: stable-maestro-recovery
  CRASH_MARKER: crash-maestro-recovery
  TARGET_APP_VERSION: 1.0.x
onFlowStart:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: bootstrap
        CONTROL_URL: ${CONTROL_URL}
onFlowComplete:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: cleanup
        CONTROL_URL: ${CONTROL_URL}
---
- launchApp
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureBuiltInBundleId
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${STABLE_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${STABLE_MARKER}
      MESSAGE: Maestro recovery stable bundle
      MODE: reset
      OUTPUT_KEY: stableBundleId
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- launchApp
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.stableBundleId}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- launchApp
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.stableBundleId}
      EXPECTED_MARKER: ${STABLE_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- scrollUntilVisible:
    element: ${output.emptyCrashHistoryText}
    direction: DOWN
    timeout: 20000
- assertVisible: ${output.emptyCrashHistoryText}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: stable
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.stableBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertLaunchReport
      CONTROL_URL: ${CONTROL_URL}
      OPTIONAL: "true"
      STATUS: STABLE
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${STABLE_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${CRASH_MARKER}
      MESSAGE: Maestro recovery crash bundle
      MODE: crash
      OUTPUT_KEY: crashBundleId
      SAFE_BUNDLE_IDS: ${output.builtInBundleId},${output.stableBundleId}
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- launchApp
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.crashBundleId}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- launchApp
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: sleep
      SECONDS: "8"
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.stableBundleId}
      EXPECTED_MARKER: ${STABLE_MARKER}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertLaunchReport
      CONTROL_URL: ${CONTROL_URL}
      CRASHED_BUNDLE_ID: ${output.crashBundleId}
      STATUS: RECOVERED
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: recovered
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.stableBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertCrashHistory
      BUNDLE_ID: ${output.crashBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: writeSummary
      CONTROL_URL: ${CONTROL_URL}
      SCENARIO: ${SCENARIO_NAME}
      STATUS: RECOVERED
