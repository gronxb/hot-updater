appId: ${APP_ID}
env:
  CONTROL_URL: ${CONTROL_URL}
  SCENARIO_NAME: release-ota-recovery
  STABLE_CHANNEL: production
  STABLE_MARKER: stable-maestro-recovery
  CRASH_MARKER: crash-maestro-recovery
  TARGET_APP_VERSION: 1.0.x
onFlowStart:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: bootstrap
        CONTROL_URL: ${CONTROL_URL}
onFlowComplete:
  - runScript:
      file: ../scripts/control.js
      env:
        ACTION: cleanup
        CONTROL_URL: ${CONTROL_URL}
---
# Verify the built-in bundle before any remote deployment.
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureBuiltInBundleId
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.builtInBundleId}
      EXPECTED_MARKER: ${output.initialMarker}
# Deploy a stable OTA and confirm it becomes the active bundle.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${STABLE_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      MARKER: ${STABLE_MARKER}
      MESSAGE: Maestro recovery stable bundle
      MODE: reset
      OUTPUT_KEY: stableBundleId
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.stableBundleId}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertFirstOtaUsesArchive
      BUNDLE_ID: ${output.stableBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.stableBundleId}
      EXPECTED_MARKER: ${STABLE_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: STABLE"
- runFlow:
    file: subflows/assert-empty-crash-history.yaml
    env:
      APP_ID: ${APP_ID}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: stable
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.stableBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertLaunchReport
      CONTROL_URL: ${CONTROL_URL}
      OPTIONAL: "true"
      STATUS: STABLE
# Deploy a crash bundle, then verify automatic recovery back to stable.
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: deployBundle
      CHANNEL: ${STABLE_CHANNEL}
      CONTROL_URL: ${CONTROL_URL}
      DIFF_BASE_BUNDLE_ID: ${output.stableBundleId}
      MARKER: ${CRASH_MARKER}
      MESSAGE: Maestro recovery crash bundle
      MODE: crash
      OUTPUT_KEY: crashBundleId
      SAFE_BUNDLE_IDS: ${output.builtInBundleId},${output.stableBundleId}
      TARGET_APP_VERSION: ${TARGET_APP_VERSION}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForMetadata
      BUNDLE_ID: ${output.crashBundleId}
      CONTROL_URL: ${CONTROL_URL}
      VERIFICATION_PENDING: "true"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertBsdiffPatchApplied
      ASSET_PATH: ${output.crashBundleIdDiffPatchAssetPath}
      BASE_BUNDLE_ID: ${output.stableBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runFlow:
    file: subflows/launch-app-home.yaml
    env:
      APP_ID: ${APP_ID}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: waitForCrashRecovery
      CONTROL_URL: ${CONTROL_URL}
      CRASHED_BUNDLE_ID: ${output.crashBundleId}
      STABLE_BUNDLE_ID: ${output.stableBundleId}
- runFlow:
    file: subflows/assert-bundle-marker.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_BUNDLE_ID: ${output.stableBundleId}
      EXPECTED_MARKER: ${STABLE_MARKER}
- runFlow:
    file: subflows/assert-launch-status.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_LAUNCH_STATUS: "Current Launch Status: RECOVERED"
- runFlow:
    file: subflows/assert-crashed-bundle-result.yaml
    env:
      APP_ID: ${APP_ID}
      EXPECTED_CRASHED_BUNDLE_RESULT: "Current Crashed Bundle ID: ${output.crashBundleId}"
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertLaunchReport
      CONTROL_URL: ${CONTROL_URL}
      CRASHED_BUNDLE_ID: ${output.crashBundleId}
      STATUS: RECOVERED
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: captureState
      CONTROL_URL: ${CONTROL_URL}
      PREFIX: recovered
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertMetadataActive
      BUNDLE_ID: ${output.stableBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: assertCrashHistory
      BUNDLE_ID: ${output.crashBundleId}
      CONTROL_URL: ${CONTROL_URL}
- runScript:
    file: ../scripts/control.js
    env:
      ACTION: writeSummary
      CONTROL_URL: ${CONTROL_URL}
      SCENARIO: ${SCENARIO_NAME}
      STATUS: RECOVERED
